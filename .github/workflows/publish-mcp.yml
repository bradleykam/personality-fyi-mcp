name: Publish to MCP Registry

on:
  push:
    branches: [master]
    paths: [server.json, Dockerfile]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bradleykam/personality-fyi-mcp:1.0.0
            ghcr.io/bradleykam/personality-fyi-mcp:latest

      - name: Install mcp-publisher
        run: |
          VERSION=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "Installing mcp-publisher ${VERSION}"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_linux_amd64.tar.gz" -o /tmp/mcp.tar.gz
          tar -xzf /tmp/mcp.tar.gz -C /tmp
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -3

      - name: Validate server.json
        run: mcp-publisher validate

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
